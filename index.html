<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Visor RA</title>
    <!-- Importamos la librería de Google Model Viewer -->
    <script type="module" src="https://googleapis.com"></script>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f0f0; font-family: sans-serif; }
        model-viewer { width: 100%; height: 100%; }
        .ar-button { background-color: #007bff; color: white; border: none; padding: 14px 28px; border-radius: 8px; font-size: 16px; font-weight: bold; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); cursor: pointer; box-shadow: 0px 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <!-- Configuracion con tus archivos tinker -->
    <model-viewer 
      src="tinker.glb" 
      ios-src="tinker.usdz" 
      ar 
      ar-modes="webxr scene-viewer quick-look" 
      camera-controls 
      auto-rotate
      shadow-intensity="1"
      bounds="tight">
      
      <button slot="ar-button" class="ar-button">
        Ver en mi espacio (RA)
      </button>
    </model-viewer>

</body>
</html>
